[MCU.esp32]
BOARD = "ESP32_GENERIC_S3"
BOARD_VARIANT = "SPIRAM_OCT"
flash_size = 16
enable_jtag_repl = 'n'
enable_cdc_repl = 'n'
enable_uart_repl = 'y'
uart_repl_bitrate = 115200


[RGBBus.display_bus]
data0 = 8
data1 = 3
data2 = 46
data3 = 9
data4 = 1
data5 = 5
data6 = 6
data7 = 7
data8 = 15
data9 = 16
data10 = 4
data11 = 45
data12 = 48
data13 = 47
data14 = 21
data15 = 14
hsync = 39
vsync = 41
de = 40
pclk = 42
freq = 12000000
hsync_front_porch = 1
hsync_back_porch = 32
hsync_pulse_width = 50
# hsync_idle_low defaults to false; vsync_idle_low is explicitly true per the
# official 4D Systems GFX4dESP32 library panel timing specification.
hsync_idle_low = false
vsync_front_porch = 1
vsync_back_porch = 33
vsync_pulse_width = 1
vsync_idle_low = true
de_idle_high = false
pclk_idle_high = false
pclk_active_low = true


[I2C.Bus.i2c_bus]
host = 0
scl = 18
sda = 17
freq = 400000


[I2C.Device.indev_device]
bus = "i2c_bus"
dev_id = "ft5x46.I2C_ADDR"
reg_bits = "ft5x46.BITS"


[RGBDisplay.display]
data_bus = "display_bus"
display_width = 800
display_height = 480
backlight_pin = 2
color_space = "lv.COLOR_FORMAT.RGB565"


[display.set_power]
params = [true]


[display.init]
params = []


[FT5x46.indev]
device = "indev_device"

[indev._cal.alphaX]
value = -0.011764519

[indev._cal.betaX]
value = 2.176436

[indev._cal.deltaX]
value = -4.7288592

[indev._cal.alphaY]
value = 2.270234

[indev._cal.betaY]
value = 0.0066771596

[indev._cal.deltaY]
value = 11.731292

[indev._cal.mirrorX]
value = false

[indev._cal.mirrorY]
value = false

[indev._cal.save]
params = []


[display.set_backlight]
params = [100]


[task_handler.TaskHandler]
params=[]
